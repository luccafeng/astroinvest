name: Daily dashboard build
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'generate_dashboard.py'
      - 'unified_scanner.py'
      - 'news_monitor.py'
      - 'data/**'
      - '.github/workflows/daily.yml'

concurrency:
  group: daily-dashboard
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Generate dashboard
        env:
          GITHUB_REPO: ${{ github.repository }}
          CRYPTOPANIC_KEY: ${{ secrets.CRYPTOPANIC_KEY }}
        run: python generate_dashboard.py --output ./dist/index.html
      - name: Commit dashboard output
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add -f dist/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Daily dashboard build $(date -u +%Y-%m-%d)"
          # 处理远端已更新的情况（重跑、并发触发等）
          for i in 1 2 3; do
            if git pull --rebase --autostash origin main && git push origin main; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "Failed to push after 3 attempts."
          exit 1
